<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Consulta de Sites - EQS</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-dark: #640b0b;
            --bg-light: #c21a1a;
            --card-glass: rgba(255, 255, 255, 0.1);
            --text-main: #FFFFFF;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --accent: #FFFFFF;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --radius: 20px;
            --glass-border: rgba(255, 255, 255, 0.3);
            --input-bg: rgba(0, 0, 0, 0.2);
        }

        .dark-mode {
            --bg-dark: #2a0404;
            --bg-light: #5c0b0b;
            --card-glass: rgba(0, 0, 0, 0.2);
            --input-bg: rgba(0, 0, 0, 0.4);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        img {
            image-rendering: -webkit-optimize-contrast;
            backface-visibility: hidden;
        }

        body {
            background: url('fundo.png') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-bottom: 30px;
            position: relative;
            overflow-x: hidden;
        }

        /* Overlay para garantir a legibilidade do texto e aplicar o Dark Mode */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.2);
            z-index: -1;
            transition: background 0.4s ease;
        }

        .dark-mode body::before {
            background: rgba(0, 0, 0, 0.7);
        }

        /* Glassmorphism Classes */
        .glass {
            background: var(--card-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            transform: translateZ(0);
            /* Força aceleração de hardware no mobile */
        }

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            width: 100%;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .main-container.has-results {
            justify-content: flex-start;
            padding-top: 40px;
        }

        .hero-glass {
            background: rgba(255, 255, 255, 0.1);
            /* Liquid glass effect */
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            border-left: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 28px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            padding: 30px 20px;
            max-width: 540px;
            width: calc(100% - 32px);
            margin: 0 auto 20px;
        }

        .dark-mode .hero-glass {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            border-left: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            position: relative;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 28px;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -0.5px;
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.6);
        }

        /* Liquid Glass Toggle */
        .toggle-wrap {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 200;
        }

        #theme-check {
            display: none;
        }

        .toggle-label {
            display: flex;
            align-items: center;
            width: 56px;
            height: 30px;
            border-radius: 50px;
            cursor: pointer;
            position: relative;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.25);
            transition: all 0.4s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .toggle-label:active {
            transform: scale(0.93);
        }

        .toggle-knob {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            transition: transform 0.4s cubic-bezier(0.68, -0.15, 0.27, 1.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            line-height: 1;
        }

        .toggle-knob::after {
            content: '☀️';
            font-size: 13px;
        }

        .dark-mode .toggle-label {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .dark-mode .toggle-knob {
            transform: translateX(26px);
            background: rgba(30, 30, 40, 0.95);
        }

        .dark-mode .toggle-knob::after {
            content: '🌙';
        }

        .search-section {
            width: 100%;
        }

        .search-box {
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        input {
            width: 100%;
            padding: 18px;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            font-size: 16px;
            background: var(--input-bg);
            color: var(--text-main);
            outline: none;
            transition: all 0.3s;
        }

        input::placeholder {
            color: var(--text-secondary);
        }

        input:focus {
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.5);
            background: rgba(0, 0, 0, 0.4);
        }

        button#search-btn,
        .copy-btn {
            width: 100%;
            padding: 18px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dark-mode button#search-btn,
        .dark-mode .copy-btn {
            backdrop-filter: blur(5px);
        }

        button#search-btn:hover,
        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-1px);
        }

        button#search-btn:active,
        .copy-btn:active {
            transform: scale(0.98);
        }

        .results-area {
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-width: 500px;
            margin: 0 auto;
            padding: 0 16px;
        }

        .card {
            padding: 20px;
            transition: transform 0.2s;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            gap: 12px;
        }

        .card-titles {
            display: flex;
            flex-direction: column;
        }

        .ticket-id {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 4px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .card .main-id {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-main);
        }


        .badge {
            display: inline-flex;
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
        }

        /* Light Mode Badges (solid) */
        body:not(.dark-mode) .badge-valid {
            background: #E8F5E9;
            color: #2E7D32;
            border: 1px solid #C8E6C9;
        }

        body:not(.dark-mode) .badge-overdue {
            background: #FFEBEE;
            color: #C62828;
            border: 1px solid #FFCDD2;
        }

        /* Dark Mode Badges (glass) */
        .dark-mode .badge {
            backdrop-filter: blur(5px);
        }

        .dark-mode .badge-valid {
            background: rgba(46, 125, 50, 0.5);
            border: 1px solid rgba(46, 125, 50, 0.8);
        }

        .dark-mode .badge-overdue {
            background: rgba(198, 40, 40, 0.5);
            border: 1px solid rgba(198, 40, 40, 0.8);
        }

        .obs {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-main);
            background: rgba(0, 0, 0, 0.03);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid var(--text-secondary);
        }

        .dark-mode .obs {
            background: rgba(0, 0, 0, 0.3);
        }


        .loading,
        .no-results {
            text-align: center;
            color: var(--text-secondary);
            margin-top: 40px;
            font-size: 16px;
        }

        .saving-text {
            text-align: center;
            color: var(--text-main);
            font-size: 15px;
            font-weight: 600;
            margin-top: 10px;
            display: none;
        }

        /* Rodapé com Logo */
        footer {
            margin-top: auto;
            text-align: center;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .footer-logo {
            max-height: 14px;
            /* Super pequeno, equivalente a ~letrinhas de rodapé~ */
            opacity: 0.6;
            transition: all 0.3s;
            filter: grayscale(100%);
        }

        .footer-logo:hover {
            filter: none;
            opacity: 1;
        }

        .dark-mode .footer-logo {
            background: rgba(255, 255, 255, 0.9);
            padding: 4px 8px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        #loading-spinner {
            display: none;
            margin: 20px auto;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(3, 112, 243, 0.2);
            border-top: 3px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="toggle-wrap">
        <input type="checkbox" id="theme-check">
        <label for="theme-check" class="toggle-label" aria-label="Alterar Tema">
            <span class="toggle-knob"></span>
        </label>
    </div>

    <main class="main-container" id="main-container">
        <div class="hero-glass">
            <header>
                <h1>Consulta de Chamados TBSA</h1>
            </header>

            <div class="search-section">
                <div class="glass search-box">
                    <input type="text" id="search-input" placeholder="Estação, id detentora ou chamado...">
                    <button id="search-btn">Consultar Chamado</button>
                    <div id="status-sync"></div>
                </div>
                <div id="status-search" style="margin-top: 15px; text-align: center;"></div>
                <div id="loading-spinner"></div>
                <div id="loading-text" class="saving-text">Consultando base de dados...</div>
            </div>
        </div>

        <div class="results-area" id="results-list">
            <!-- Cards serão inseridos aqui -->
        </div>
    </main>

    <footer>
        <img src="logo-eqs.png" alt="EQS Engenharia" class="footer-logo">
    </footer>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSd38yd9rKqhhtcr-np09wmsa2VsS2wV4cQqPjqQbzV7bUhZJTWwrXqO-4aPAHK9g/pub?output=csv';
        // Dados de Fallback (Offline) - Extraídos do CSV original para garantir funcionamento local
        const OFFLINE_DATA = [
            { "c": "00358519", "t": "TEMGBHO0027", "l": "EMG0010", "f": "2026-05-31", "o": "Carta encaminhada ao local. Problemas de acesso, acionar o NOC TBSA." },
            { "c": "00358516", "t": "TEMGBHO0004", "l": "EMG0135", "f": "2026-05-31", "o": "Necessário retirar a chave na Claro." },
            { "c": "00358565", "t": "TEMGDIV0002", "l": "EMG0349", "f": "2026-05-31", "o": "Direcionar os técnicos com a carta de liberação em mãos." },
            { "c": "00358008", "t": "TCMGACA0001", "l": "MGACA01", "f": "2026-05-30", "o": "Apresentação apenas do chamado na Central da Claro." },
            { "c": "00358009", "t": "TCMGACA0002", "l": "MGACAR1", "f": "2026-05-30", "o": "Uso do APP MASTER LOCK VAULT ENTERPRISE." },
            { "c": "00358010", "t": "TCMGAME0001", "l": "MGAME01", "f": "2026-05-30", "o": "Retirada de chaves na Central da Claro." },
            { "c": "00358015", "t": "TCMGBHO0001", "l": "MGBAR02", "f": "2026-05-30", "o": "Uso do APP MASTER LOCK VAULT ENTERPRISE." },
            { "c": "00358072", "t": "TCMGNLM0003", "l": "MGBAR19", "f": "2026-05-30", "o": "PORTÃO: CHAMAR NA RÁDIO / PORTÃO SEGREDO: 3631." },
            { "c": "00358011", "t": "TCMGBDP0001", "l": "MGBDP02", "f": "2026-05-30", "o": "Uso do APP MASTER LOCK VAULT ENTERPRISE." },
            { "c": "00358552", "t": "TCMGBDP0002", "l": "MGBDP03", "f": "2026-05-31", "o": "Carta encaminhada ao local." },
            { "c": "00358113", "t": "TEMGBHO0019", "l": "MGBEL01", "f": "2026-05-30", "o": "Retirada de chaves na Central da Claro." },
            { "c": "00358176", "t": "TCMGBHO0003", "l": "MGBEL03", "f": "2026-05-30", "o": "Carta encaminhada ao local." },
            { "c": "00358188", "t": "TCMGBHO0005", "l": "MGBEL18", "f": "2026-05-30", "o": "PORTA DE ACESSO: CADEADO SEGREDO 3631." },
            { "c": "00358110", "t": "TEMGBET0004", "l": "MGBET05", "f": "2026-05-30", "o": "Carta encaminhada para o local." },
            { "c": "00358012", "t": "TCMGBET0004", "l": "MGBET11", "f": "2026-05-30", "o": "Uso do APP MASTER LOCK VAULT ENTERPRISE." },
            { "c": "00358049", "t": "TCMGESM0001", "l": "MGBET30", "f": "2026-05-30", "o": "Uso do APP MASTER LOCK VAULT ENTERPRISE." },
            { "c": "00358025", "t": "TCMGBLD0001", "l": "MGBLD01", "f": "2026-05-30", "o": "SEGREDO 0001." },
            { "c": "00358194", "t": "TCMGBHO0010", "l": "MGBRT02", "f": "2026-05-30", "o": "PORTA: SEGREDO 3631." },
            { "c": "00358027", "t": "TCMGBVM0001", "l": "MGBVMR1", "f": "2026-05-30", "o": "Uso do APP MASTER LOCK VAULT ENTERPRISE." },
            { "c": "00358042", "t": "TCMGDIV0006", "l": "MGDIV09", "f": "2026-05-30", "o": "CADEADO SEGREDO: 0009." },
            { "c": "00358043", "t": "TCMGDIV0008", "l": "MGDIV12", "f": "2026-05-30", "o": "Uso do APP MASTER LOCK VAULT ENTERPRISE." },
            { "c": "00358116", "t": "TTMGFDS0001", "l": "MGFDS80", "f": "2026-05-30", "o": "SEGREDO: 0001." },
            { "c": "00358117", "t": "TTMGLGP0002", "l": "MGLGP07", "f": "2026-05-30", "o": "CADEADO SEGREDO: 0002." },
            { "c": "00358088", "t": "TCMGRBN0002", "l": "MGRBN08", "f": "2026-05-30", "o": "CADEADO DE SEGREDO 0002." },
            { "c": "00358089", "t": "TCMGRCA0001", "l": "MGRCAR1", "f": "2026-05-30", "o": "PORTÃO 1: Segredo Claro 3631." }
        ];

        let dataStore = [];

        // Elementos UI
        const input = document.getElementById('search-input');
        const btn = document.getElementById('search-btn');
        const resultsList = document.getElementById('results-list');
        const statusSync = document.getElementById('status-sync');
        const statusSearch = document.getElementById('status-search');
        const spinner = document.getElementById('loading-spinner');

        // Inicialização: Fetch dos dados com timeout
        async function fetchData() {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 3000);
            const loadingText = document.getElementById('loading-text');

            try {
                spinner.style.display = 'block';
                loadingText.style.display = 'block';
                statusSync.innerHTML = '';

                let response;

                try {
                    // Tentativa 1: Direto (funciona em servidores ou se o CORS permitir)
                    response = await fetch(CSV_URL, { signal: controller.signal });
                } catch (e) {
                    // Tentativa 2: Via Proxy CORS (para quando o arquivo é aberto localmente via file://)
                    console.warn('Tentando via Proxy CORS...');
                    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(CSV_URL)}`;
                    response = await fetch(proxyUrl);
                }

                if (!response || !response.ok) throw new Error('Falha completa no download');

                const text = await response.text();
                const remoteData = parseCSV(text);

                dataStore = remoteData.map(item => ({
                    c: item['CHAMADO'] || '',
                    t: item['ID TBSA'] || '',
                    l: item['ID CLARO'] || '',
                    f: item['FIM ACESSO'] || '',
                    o: item['OBSERVAÇÕES'] || ''
                }));

                statusSync.innerHTML = '<span style="color: #2e7d32;">● Conectado à Planilha chamados tbsa (Sincronizado)</span>';
                spinner.style.display = 'none';
                loadingText.style.display = 'none';
                clearTimeout(timeoutId);
            } catch (error) {
                clearTimeout(timeoutId);
                dataStore = OFFLINE_DATA;
                statusSync.innerHTML = `
                    <div style="color: #d32f2f; background: #ffebee; padding: 10px; border-radius: 8px; font-size: 13px; margin-top: 10px; text-align: left; line-height: 1.4;">
                        <strong>Sincronização Indisponível</strong><br>
                        O navegador bloqueou o acesso à planilha e o servidor de backup falhou. <br>
                        <small>Exibindo apenas 25 sites de backup offline.</small>
                    </div>
                `;
                spinner.style.display = 'none';
                loadingText.style.display = 'none';
            }
        }

        function parseCSV(text) {
            const lines = text.split(/\r?\n/).filter(line => line.trim() !== '');
            if (lines.length === 0) return [];
            const headers = parseCSVLine(lines[0]);
            return lines.slice(1).map(line => {
                const values = parseCSVLine(line);
                const obj = {};
                headers.forEach((header, i) => {
                    obj[header.trim()] = values[i] ? values[i].trim() : '';
                });
                return obj;
            });
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') {
                    if (inQuotes && line[i + 1] === '"') { current += '"'; i++; }
                    else { inQuotes = !inQuotes; }
                } else if (char === ',' && !inQuotes) { result.push(current); current = ''; }
                else { current += char; }
            }
            result.push(current);
            return result;
        }

        function handleSearch() {
            const query = input.value.trim().toLowerCase();
            resultsList.innerHTML = '';
            document.getElementById('main-container').classList.add('has-results');

            if (dataStore.length === 0) {
                statusSearch.textContent = 'Aguarde o carregamento inicial da base...';
                return;
            }

            if (!query) {
                statusSearch.textContent = 'Digite algo para buscar.';
                return;
            }

            // Busca Instantânea
            const filtered = dataStore.filter(item => {
                return (item.t || '').toLowerCase().includes(query) ||
                    (item.l || '').toLowerCase().includes(query) ||
                    (item.c || '').toLowerCase().includes(query);
            });

            if (filtered.length === 0) {
                statusSearch.innerHTML = `
                    <div style="color: #d32f2f; background: #ffebee; padding: 15px; border-radius: 12px; font-weight: 500; font-size: 14px; line-height: 1.4; border: 1px solid #ffcdd2;">
                        Caso não encontre pelo site, busque pelo id da detentora ou solicite seu supervisor abertura do chamado..
                    </div>
                `;
                return;
            }

            statusSearch.textContent = '';
            filtered.forEach(item => resultsList.appendChild(createCard(item)));
        }


        function createCard(item) {
            const card = document.createElement('div');
            card.className = 'glass card';
            const isOverdue = checkIfOverdue(item.f);
            const dateDisplay = formatDisplayDate(item.f);

            card.innerHTML = `
                <div class="card-header">
                    <div class="card-titles">
                        <div class="ticket-id">CHAMADO #${item.c}</div>
                        <div class="main-id">${item.t}<br><span style="font-size: 16px; font-weight: 600; opacity: 0.8;">${item.l}</span></div>
                    </div>
                    <div class="badge ${isOverdue ? 'badge-overdue' : 'badge-valid'}">
                        ${dateDisplay}
                    </div>
                </div>
                ${item.o ? `<div class="obs">${item.o}</div>` : ''}
                <button class="copy-btn" onclick="copyCardData('${item.c}', '${item.t}', '${item.l}', '${dateDisplay}', '${item.o}')">
                    COPIAR
                </button>
            `;
            return card;
        }

        window.copyCardData = function (chamado, tbsa, claro, validade, obs) {
            const textToCopy = `CHAMADO #${chamado} | Site: ${tbsa} | Estação: ${claro} | VÁLIDO ATÉ ${validade} | OBS: ${obs || 'Sem observações.'}`;
            navigator.clipboard.writeText(textToCopy).then(() => {
                alert('Dados copiados: ' + textToCopy);
            }).catch(err => {
                console.error('Erro ao copiar:', err);
            });
        };

        function checkIfOverdue(dateStr) {
            if (!dateStr) return false;
            const scheduledDate = new Date(dateStr + 'T23:59:59');
            return scheduledDate < new Date();
        }

        function formatDisplayDate(dateStr) {
            if (!dateStr) return '--/--/----';
            try {
                const parts = dateStr.split('-');
                if (parts.length !== 3) return dateStr;
                return `${parts[2]}/${parts[1]}/${parts[0]}`;
            } catch (e) { return dateStr; }
        }

        // Tema Noturno — Liquid Glass Toggle
        const themeCheck = document.getElementById('theme-check');
        themeCheck.addEventListener('change', () => {
            document.body.classList.toggle('dark-mode', themeCheck.checked);
            localStorage.setItem('eqs-theme', themeCheck.checked ? 'dark' : 'light');
        });

        // Recuperar preferência
        if (localStorage.getItem('eqs-theme') === 'dark') {
            document.body.classList.add('dark-mode');
            themeCheck.checked = true;
        }

        // Enter para buscar
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSearch();
        });

        btn.addEventListener('click', handleSearch);
        window.addEventListener('load', fetchData);
    </script>
</body>

</html>
